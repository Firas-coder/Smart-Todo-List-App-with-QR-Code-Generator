{% extends 'base.html' %}
{% block title %}Add Task{% endblock %}
{% block content %}
<form action="" method="POST">
    {% csrf_token %}
    <label for="titlehtml">Title:</label>
    <input type="text" id="titlehtml" name="titlehtml"><br>
    <label for="descriptionhtml">Description:</label>
    <textarea id="descriptionhtml" name="descriptionhtml"></textarea><br>
    <label for="statushtml">Status:</label>
    <select id="statushtml" name="statushtml">
        <option value="pending">Pending</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
    </select><br>
    <label for="date_completedhtml">Date Completed:</label>
    <input type="date" id="date_completedhtml" name="date_completedhtml"><br>
    <button type="submit">Add Task</button>
</form>
{% endblock %}
